# ===========================================
# tmux Additional Plugins Configuration
# ===========================================
# この設定を .tmux.conf の末尾に source-file で読み込む
# または内容を直接 .tmux.conf に追加

# Catppuccin はステータスバーとウィンドウ表示を大きく上書きするため、
# 現在は無効化して .tmux.conf 側の手組みデザインを優先する。

# ----- Session Persistence -----
set -g @plugin 'tmux-plugins/tmux-resurrect'

# resurrect設定
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'  # neovimセッション復元

# continuum設定
# 自動保存は有効、復元は prefix + Ctrl-r で手動実行
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'  # 15分ごとに自動保存

# ----- Optional: Better mouse support -----
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# status-right を使って定期保存を差し込むため、continuum は最後に置く
set -g @plugin 'tmux-plugins/tmux-continuum'

# Note: TPM run command is in main .tmux.conf
# プラグインインストール: prefix + I
